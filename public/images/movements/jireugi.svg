<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 180" fill="none">
  <!-- Head -->
  <circle cx="60" cy="22" r="12" fill="#94a3b8" />
  <!-- Body -->
  <line x1="60" y1="34" x2="60" y2="90" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <!-- Punching arm (extended right) -->
  <line x1="60" y1="50" x2="105" y2="55" stroke="#6366f1" stroke-width="4" stroke-linecap="round"/>
  <!-- Fist -->
  <rect x="105" y="51" width="10" height="8" rx="2" fill="#6366f1"/>
  <!-- Pulling arm (left, at hip) -->
  <line x1="60" y1="50" x2="28" y2="70" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <!-- Front leg (ap-kubi) -->
  <line x1="60" y1="90" x2="75" y2="140" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="75" y1="140" x2="80" y2="170" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <!-- Back leg -->
  <line x1="60" y1="90" x2="38" y2="130" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="38" y1="130" x2="28" y2="165" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <!-- Direction arrow -->
  <polyline points="88,46 100,51 88,56" fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
