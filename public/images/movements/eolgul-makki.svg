<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 180" fill="none">
  <!-- Head -->
  <circle cx="60" cy="22" r="12" fill="#94a3b8"/>
  <!-- Body -->
  <line x1="60" y1="34" x2="60" y2="90" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <!-- Blocking arm rising diagonally above head -->
  <line x1="60" y1="46" x2="45" y2="54" stroke="#94a3b8" stroke-width="3" stroke-dasharray="3 2" opacity="0.4" stroke-linecap="round"/>
  <line x1="45" y1="54" x2="88" y2="10" stroke="#6366f1" stroke-width="4" stroke-linecap="round"/>
  <!-- Fist above head -->
  <rect x="86" y="6" width="9" height="8" rx="2" fill="#6366f1"/>
  <!-- Chamber arm at hip -->
  <line x1="60" y1="52" x2="30" y2="68" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <!-- Legs ap-kubi -->
  <line x1="60" y1="90" x2="76" y2="140" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="76" y1="140" x2="80" y2="170" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="60" y1="90" x2="38" y2="132" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="38" y1="132" x2="28" y2="165" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <!-- Upward arc -->
  <path d="M 46 52 Q 60 28 85 12" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="3 3" fill="none" opacity="0.5"/>
</svg>
