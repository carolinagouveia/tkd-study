<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 180" fill="none">
  <!-- Head -->
  <circle cx="48" cy="20" r="12" fill="#94a3b8"/>
  <!-- Body (leaning slightly) -->
  <line x1="48" y1="32" x2="50" y2="88" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <!-- Arms extended for balance -->
  <line x1="50" y1="52" x2="18" y2="62" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="50" y1="52" x2="78" y2="42" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <!-- Support leg (straight) -->
  <line x1="50" y1="88" x2="44" y2="150" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="44" y1="150" x2="38" y2="172" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <!-- Kicking leg — chamber then lateral extension -->
  <line x1="50" y1="88" x2="72" y2="108" stroke="#6366f1" stroke-width="4" stroke-linecap="round"/>
  <line x1="72" y1="108" x2="108" y2="90" stroke="#6366f1" stroke-width="4" stroke-linecap="round"/>
  <!-- Blade of foot (balnal) -->
  <rect x="107" y="84" width="10" height="8" rx="2" fill="#6366f1" transform="rotate(-15 107 88)"/>
  <!-- Motion arrow -->
  <polyline points="90,82 106,88 90,95" fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
