<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 180" fill="none">
  <!-- Head -->
  <circle cx="60" cy="22" r="12" fill="#94a3b8"/>
  <!-- Body -->
  <line x1="60" y1="34" x2="60" y2="90" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <!-- Blocking arm (crosses down-diagonal) -->
  <line x1="60" y1="48" x2="45" y2="38" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="45" y1="38" x2="25" y2="78" stroke="#6366f1" stroke-width="4" stroke-linecap="round"/>
  <!-- Fist at end of block -->
  <circle cx="25" cy="80" r="5" fill="#6366f1"/>
  <!-- Chamber arm (at hip) -->
  <line x1="60" y1="50" x2="88" y2="68" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <!-- Legs ap-kubi -->
  <line x1="60" y1="90" x2="76" y2="140" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="76" y1="140" x2="80" y2="170" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="60" y1="90" x2="38" y2="132" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="38" y1="132" x2="28" y2="165" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <!-- Block arc -->
  <path d="M 48 36 Q 28 55 26 76" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4 3" fill="none" opacity="0.5"/>
</svg>
